name: fuji_maintenance_system
description: "A Flutter maintenance system with three user interfaces:
  maintenance man, admin, and user."
publish_to: "none"

version: 1.0.9+9

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  animate_do: ^4.2.0
  animated_toggle_switch: ^0.8.5
  auto_size_text: 3.0.0
  awesome_dialog: 3.2.1
  badges: 3.1.2
  bloc: ^9.1.0
  cached_network_image: ^3.4.1
  calendar_date_picker2: ^2.0.0
  carousel_slider: 5.0.0
  connectivity_plus: ^6.1.3
  cupertino_icons: 1.0.8
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0
  equatable: ^2.0.7
  extended_image: ^10.0.0
  file_picker: ^10.1.9
  fl_chart: ^0.68.0
  flex_color_scheme: ^8.2.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_color: 2.1.0
  flutter_dotenv: ^5.2.1
  flutter_launcher_icons: ^0.14.4
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: ^2.4.4
  flutter_riverpod: ^2.6.1
  flutter_screenutil: 5.9.3
  flutter_svg: ^2.0.17
  fluttertoast: ^8.2.12
  font_awesome_flutter: 10.8.0
  fpdart: 1.1.1
  gap: 3.0.1
  geolocator: ^14.0.2
  get: ^4.7.2
  get_it: ^8.0.2
  get_storage: 2.1.1
  go_router: ^14.3.0
  google_maps_flutter: ^2.13.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.3.0
  iconsax_plus: ^1.0.0
  image_cropper: ^9.0.0
  image_picker: ^1.2.0
  infinite_scroll_pagination: 5.0.0
  intl: ^0.20.2
  loading_animation_widget: ^1.3.0
  logger: 2.5.0
  lottie: ^3.3.2
  modal_bottom_sheet: 3.0.0
  open_filex: ^4.7.0
  path: 1.9.1
  path_provider: ^2.1.5
  pdf: ^3.11.1
  percent_indicator: ^4.2.5
  photo_view: null
  printing: ^5.13.4
  provider: ^6.1.5
  reactive_forms: ^18.0.0
  rflutter_alert: 2.0.7
  shimmer: 3.0.0
  skeletonizer: ^1.1.0
  sliding_up_panel: 2.0.0+1
  table_calendar: ^3.1.3
  toastification: ^3.0.1
  toggle_switch: 2.3.0
  url_launcher: ^6.3.1
  webview_flutter: ^4.13.0
  webview_flutter_android: ^4.10.5
  webview_flutter_wkwebview: ^3.23.2
  google_fonts: ^6.3.3
  elegant_notification: ^2.5.1

dev_dependencies:
  build_runner: ^2.4.13
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  hive_generator: null
  icons_launcher: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/base/drower/
    - assets/base/
    - assets/
    - assets/fonts/
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300
